<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IGZOLT Node Interface</title>

<style>
  :root{
    --bg:#081a2a;
    --bg2:#0d2740;
    --line:rgba(227,220,202,.18);
    --line-strong:rgba(227,220,202,.58);
    --ink:#efe6d0;
    --muted:rgba(239,230,208,.72);
    --accent:#e25543;
    --accent-soft:rgba(226,85,67,.18);
    --glow:rgba(239,230,208,.12);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1000px 700px at 50% 45%, rgba(255,255,255,.05), transparent 55%),
      radial-gradient(700px 500px at 50% 100%, rgba(226,85,67,.08), transparent 50%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    color:var(--ink);
  }

  body::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size:60px 60px;
    opacity:.65;
    pointer-events:none;
  }

  body::after{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.06) 0 1px, transparent 2px),
      radial-gradient(circle at 74% 18%, rgba(255,255,255,.05) 0 1px, transparent 2px),
      radial-gradient(circle at 80% 75%, rgba(255,255,255,.04) 0 1px, transparent 2px);
    opacity:.35;
    pointer-events:none;
  }

  .boot-overlay{
    position:absolute; inset:0;
    z-index:30;
    display:grid;
    place-items:center;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), rgba(0,0,0,.72)),
      #06131f;
    transition:opacity 1.1s ease, visibility 1.1s ease;
  }

  .boot-overlay.hidden{
    opacity:0;
    visibility:hidden;
  }

  .boot-copy{
    text-align:center;
    letter-spacing:.28em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--muted);
    animation:bootPulse 1.8s ease-in-out infinite;
  }

  @keyframes bootPulse{
    0%,100%{opacity:.35}
    50%{opacity:1}
  }

  .scene{
    position:relative;
    width:100%;
    height:100%;
    perspective:1400px;
    overflow:hidden;
  }

  .hud-top{
    position:absolute;
    top:26px;
    left:30px;
    right:30px;
    z-index:20;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand-mark{
    width:42px;
    height:42px;
    border:1px solid var(--line-strong);
    border-radius:50%;
    display:grid;
    place-items:center;
    background:rgba(255,255,255,.02);
    box-shadow:0 0 28px rgba(255,255,255,.06);
  }

  .brand-mark::before{
    content:"◐";
    font-size:21px;
    line-height:1;
  }

  .brand-copy b{
    display:block;
    font-size:14px;
    letter-spacing:.28em;
    text-transform:uppercase;
  }

  .brand-copy span{
    display:block;
    margin-top:5px;
    color:var(--muted);
    font-size:10px;
    letter-spacing:.24em;
    text-transform:uppercase;
  }

  .status{
    text-align:right;
    font-size:10px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--muted);
    line-height:1.8;
  }

  .status b{
    color:var(--ink);
    font-weight:700;
  }

  .center-wrap{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
  }

  .assembly{
    position:relative;
    width:min(86vw, 980px);
    height:min(86vh, 860px);
    transform-style:preserve-3d;
  }

  .ring{
    position:absolute;
    left:50%;
    top:50%;
    border:1px solid var(--line);
    border-radius:50%;
    transform-style:preserve-3d;
    opacity:0;
    animation:materialize .9s ease forwards;
  }

  .ring.r1{
    width:420px; height:420px;
    margin-left:-210px; margin-top:-210px;
    animation-delay:.35s;
  }

  .ring.r2{
    width:300px; height:300px;
    margin-left:-150px; margin-top:-150px;
    animation-delay:.55s;
  }

  .ring.r3{
    width:210px; height:210px;
    margin-left:-105px; margin-top:-105px;
    animation-delay:.75s;
  }

  .ring.spin-a{ animation-name:materialize, spinA; animation-duration:.9s, 38s; animation-delay:.35s, 1.3s; animation-iteration-count:1, infinite; animation-fill-mode:forwards, none; animation-timing-function:ease, linear;}
  .ring.spin-b{ animation-name:materialize, spinB; animation-duration:.9s, 30s; animation-delay:.55s, 1.4s; animation-iteration-count:1, infinite; animation-fill-mode:forwards, none; animation-timing-function:ease, linear;}
  .ring.spin-c{ animation-name:materialize, spinA; animation-duration:.9s, 24s; animation-delay:.75s, 1.5s; animation-iteration-count:1, infinite; animation-fill-mode:forwards, none; animation-timing-function:ease, linear;}

  @keyframes spinA{
    from{transform:translateZ(0) rotate(0deg)}
    to{transform:translateZ(0) rotate(360deg)}
  }

  @keyframes spinB{
    from{transform:translateZ(0) rotate(360deg)}
    to{transform:translateZ(0) rotate(0deg)}
  }

  .axis-v, .axis-h{
    position:absolute;
    left:50%;
    top:50%;
    background:linear-gradient(180deg, transparent, var(--line-strong), transparent);
    opacity:0;
    animation:materialize .9s ease forwards;
    animation-delay:.25s;
  }

  .axis-v{
    width:1px;
    height:90%;
    transform:translate(-50%,-50%);
  }

  .axis-h{
    width:78%;
    height:1px;
    transform:translate(-50%,-50%);
    background:linear-gradient(90deg, transparent, var(--line-strong), transparent);
  }

  .tower{
    position:absolute;
    left:50%;
    top:50%;
    width:310px;
    height:620px;
    transform:translate(-50%,-50%);
    transform-style:preserve-3d;
    animation:towerFloat 9s ease-in-out infinite 2.2s;
  }

  @keyframes towerFloat{
    0%,100%{transform:translate(-50%,-50%) translateY(0)}
    50%{transform:translate(-50%,-50%) translateY(-8px)}
  }

  .tier{
    position:absolute;
    left:50%;
    transform:translateX(-50%) scaleY(0);
    transform-origin:center bottom;
    border:1.5px solid var(--line-strong);
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.015));
    box-shadow:0 0 24px rgba(255,255,255,.04);
    opacity:0;
    animation:tierRise .8s cubic-bezier(.22,.61,.36,1) forwards;
  }

  @keyframes tierRise{
    from{opacity:0; transform:translateX(-50%) scaleY(0)}
    to{opacity:1; transform:translateX(-50%) scaleY(1)}
  }

  .t1{bottom:56px;width:150px;height:86px;animation-delay:.95s}
  .t2{bottom:132px;width:184px;height:76px;animation-delay:1.08s}
  .t3{bottom:202px;width:138px;height:64px;animation-delay:1.21s}
  .t4{bottom:262px;width:176px;height:58px;animation-delay:1.34s}
  .t5{bottom:318px;width:128px;height:52px;animation-delay:1.47s}
  .t6{bottom:368px;width:98px;height:46px;animation-delay:1.60s}
  .t7{bottom:414px;width:72px;height:40px;animation-delay:1.73s}
  .spire{
    position:absolute;
    left:50%;
    bottom:452px;
    width:2px;
    height:80px;
    background:linear-gradient(180deg, transparent, var(--line-strong), var(--line-strong));
    transform:translateX(-50%) scaleY(0);
    transform-origin:bottom;
    opacity:0;
    animation:spireRise .7s ease forwards 1.92s;
  }

  @keyframes spireRise{
    from{opacity:0;transform:translateX(-50%) scaleY(0)}
    to{opacity:1;transform:translateX(-50%) scaleY(1)}
  }

  .crescent{
    position:absolute;
    left:50%;
    bottom:522px;
    width:28px;
    height:28px;
    border:1.5px solid var(--line-strong);
    border-radius:50%;
    transform:translateX(-50%) scale(0);
    opacity:0;
    animation:materializeMoon .6s ease forwards 2.1s;
  }

  .crescent::after{
    content:"";
    position:absolute;
    left:8px;
    top:-1px;
    width:28px;
    height:28px;
    background:var(--bg2);
    border-radius:50%;
  }

  @keyframes materializeMoon{
    from{opacity:0;transform:translateX(-50%) scale(0)}
    to{opacity:1;transform:translateX(-50%) scale(1)}
  }

  .eye-core{
    position:absolute;
    left:50%;
    top:50%;
    width:170px;
    height:170px;
    margin-left:-85px;
    margin-top:-85px;
    opacity:0;
    animation:materialize .8s ease forwards 1.75s;
  }

  .eye-outline{
    position:absolute;
    inset:38px 16px;
    border:2px solid var(--line-strong);
    border-radius:50% / 62%;
  }

  .eye-outline::before{
    content:"";
    position:absolute;
    inset:0;
    border-top:2px solid var(--line-strong);
    border-bottom:2px solid var(--line-strong);
    border-radius:50% / 62%;
    transform:scaleX(1.16);
  }

  .iris{
    position:absolute;
    left:50%;
    top:50%;
    width:34px;
    height:34px;
    margin-left:-17px;
    margin-top:-17px;
    border:2px solid var(--line-strong);
    border-radius:50%;
    background:radial-gradient(circle, rgba(239,230,208,.16), transparent 62%);
    box-shadow:0 0 24px rgba(226,85,67,.24);
    animation:irisPulse 3s ease-in-out infinite 2.5s;
  }

  @keyframes irisPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.08)}
  }

  .scan{
    position:absolute;
    left:50%;
    top:50%;
    width:540px;
    height:2px;
    transform:translate(-50%,-50%);
    background:linear-gradient(90deg, transparent, rgba(239,230,208,.9), transparent);
    box-shadow:0 0 26px rgba(239,230,208,.18);
    opacity:0;
    animation:scanSweep 3.8s ease-in-out infinite 2.4s;
  }

  @keyframes scanSweep{
    0%{opacity:0; transform:translate(-50%,-160px)}
    12%{opacity:1}
    50%{opacity:.9}
    88%{opacity:1}
    100%{opacity:0; transform:translate(-50%,160px)}
  }

  .node{
    position:absolute;
    padding:11px 16px;
    border:1px solid var(--line-strong);
    border-radius:999px;
    background:rgba(7,18,29,.54);
    backdrop-filter:blur(10px);
    color:var(--ink);
    font-size:12px;
    letter-spacing:.08em;
    cursor:pointer;
    opacity:0;
    transform:translateY(18px);
    animation:nodeIn .7s ease forwards;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
    z-index:10;
  }

  .node:hover{
    transform:translateY(0) scale(1.04);
    border-color:rgba(239,230,208,.82);
    box-shadow:0 0 24px rgba(239,230,208,.10);
    background:rgba(9,25,39,.8);
  }

  @keyframes nodeIn{
    to{opacity:1;transform:translateY(0)}
  }

  .n-authority{top:20%; right:20%; animation-delay:2.15s}
  .n-infra{top:32%; left:18%; animation-delay:2.3s}
  .n-intake{bottom:18%; left:28%; animation-delay:2.45s}
  .n-ai{bottom:25%; right:24%; animation-delay:2.6s}

  .panel{
    position:absolute;
    right:28px;
    bottom:28px;
    width:min(380px, calc(100vw - 56px));
    min-height:180px;
    border:1px solid var(--line);
    border-radius:26px;
    background:rgba(7,18,29,.78);
    backdrop-filter:blur(16px);
    padding:20px 20px 18px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    opacity:0;
    transform:translateY(18px);
    transition:opacity .22s ease, transform .22s ease;
    pointer-events:none;
    z-index:15;
  }

  .panel.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .panel small{
    display:block;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:10px;
    margin-bottom:10px;
  }

  .panel h2{
    margin:0 0 10px;
    font-size:24px;
    line-height:1;
    text-transform:uppercase;
  }

  .panel p{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.7;
  }

  .panel .close{
    position:absolute;
    top:14px;
    right:14px;
    width:34px;
    height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
  }

  .portal-flash{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at 50% 50%, rgba(239,230,208,.18), transparent 40%);
    opacity:0;
    animation:flashIn 1.4s ease 1.6s forwards;
  }

  @keyframes flashIn{
    0%{opacity:0; transform:scale(.85)}
    30%{opacity:1}
    100%{opacity:0; transform:scale(1.15)}
  }

  @keyframes materialize{
    from{opacity:0; transform:scale(.88)}
    to{opacity:1; transform:scale(1)}
  }

  @media (max-width: 900px){
    .assembly{width:100vw;height:100vh}
    .ring.r1{width:320px;height:320px;margin-left:-160px;margin-top:-160px}
    .ring.r2{width:230px;height:230px;margin-left:-115px;margin-top:-115px}
    .ring.r3{width:160px;height:160px;margin-left:-80px;margin-top:-80px}
    .tower{transform:translate(-50%,-50%) scale(.82)}
    .n-authority{top:14%; right:8%}
    .n-infra{top:26%; left:8%}
    .n-intake{bottom:18%; left:8%}
    .n-ai{bottom:22%; right:8%}
    .panel{left:14px; right:14px; bottom:14px; width:auto}
    .hud-top{left:16px; right:16px; top:16px}
    .status{display:none}
  }
</style>
</head>
<body>
  <div class="boot-overlay" id="boot">
    <div class="boot-copy">Initializing IGZOLT Node</div>
  </div>

  <div class="scene">
    <div class="portal-flash"></div>

    <div class="hud-top">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <b>IGZOLT Node</b>
          <span>ADAI Network · EdgeLayer Systems</span>
        </div>
      </div>
      <div class="status">
        <div><b>Status:</b> Materializing Realm</div>
        <div><b>Mode:</b> Spatial Interface Ready</div>
      </div>
    </div>

    <div class="center-wrap">
      <div class="assembly">
        <div class="axis-v"></div>
        <div class="axis-h"></div>

        <div class="ring r1 spin-a"></div>
        <div class="ring r2 spin-b"></div>
        <div class="ring r3 spin-c"></div>

        <div class="tower">
          <div class="tier t1"></div>
          <div class="tier t2"></div>
          <div class="tier t3"></div>
          <div class="tier t4"></div>
          <div class="tier t5"></div>
          <div class="tier t6"></div>
          <div class="tier t7"></div>
          <div class="spire"></div>
          <div class="crescent"></div>
        </div>

        <div class="eye-core">
          <div class="eye-outline"></div>
          <div class="iris"></div>
        </div>

        <div class="scan"></div>

        <button class="node n-authority" data-title="Authority Layer" data-copy="Governance, brand doctrine, structural positioning, and long-horizon ownership logic live in this layer.">Authority Layer</button>
        <button class="node n-infra" data-title="Infrastructure" data-copy="Hosting, deployment, DNS, repository structure, and technical backbone connect through this node.">Infrastructure</button>
        <button class="node n-intake" data-title="Intake System" data-copy="Client entry, routing, AI qualification, and project activation expand from this intake layer.">Intake System</button>
        <button class="node n-ai" data-title="AI Routing" data-copy="Future agent behavior, memory, voice control, and multi-system orchestration will connect here.">AI Routing</button>
      </div>
    </div>

    <aside class="panel" id="panel">
      <button class="close" id="closePanel">×</button>
      <small>Node Output</small>
      <h2 id="panelTitle">Layer</h2>
      <p id="panelCopy">System information will display here.</p>
    </aside>
  </div>

<script>
  const boot = document.getElementById('boot');
  const panel = document.getElementById('panel');
  const panelTitle = document.getElementById('panelTitle');
  const panelCopy = document.getElementById('panelCopy');
  const closePanel = document.getElementById('closePanel');

  window.addEventListener('load', () => {
    setTimeout(() => boot.classList.add('hidden'), 1700);
  });

  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('click', () => {
      panelTitle.textContent = node.dataset.title;
      panelCopy.textContent = node.dataset.copy;
      panel.classList.add('active');
    });
  });

  closePanel.addEventListener('click', () => {
    panel.classList.remove('active');
  });
</script>
</body>
</html>
