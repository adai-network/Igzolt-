<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IGZOLT Node Interface</title>

<style>

body{
margin:0;
background:#0b1b2c;
color:#fff;
font-family:system-ui;
overflow:hidden;
}

#grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

background-size:60px 60px;
}

#core{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:300px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
}

#core::before{
content:"";
position:absolute;
width:150px;
height:150px;
border-radius:50%;
border:2px solid #ff4b3e;
animation:spin 12s linear infinite;
}

#core::after{
content:"";
position:absolute;
width:220px;
height:220px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.1);
animation:spin 24s linear infinite reverse;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#core span{
font-size:18px;
letter-spacing:2px;
}

.node{
position:absolute;
padding:10px 18px;
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
cursor:pointer;
backdrop-filter:blur(6px);
}

#authority{top:20%;left:60%;}
#intake{top:70%;left:30%;}
#systems{top:30%;left:20%;}

</style>

</head>

<body>

<div id="grid"></div>

<div id="core">
<span>IGZOLT CORE</span>
</div>

<div class="node" id="authority">Authority Layer</div>
<div class="node" id="intake">Intake System</div>
<div class="node" id="systems">Infrastructure</div>

<script>

document.querySelectorAll('.node').forEach(node=>{
node.onclick=()=>{
alert(node.innerText + " module loading...");
}
})

</script>

</body>
</html>
